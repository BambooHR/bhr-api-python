name: Publish to PyPI

# TODO: Re-enable the tag trigger once the TestPyPI workflow has been validated end-to-end.
# on:
#   push:
#     tags:
#       - "v*"
on:
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag is reachable from main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit $GITHUB_SHA is not an ancestor of origin/main." >&2
            echo "Only commits merged to main may be released." >&2
            exit 1
          fi

      - name: Verify tag version matches pyproject.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          project_version=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag" != "$project_version" ]; then
            echo "Tag version ($tag) does not match pyproject.toml version ($project_version)" >&2
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
