name: Generate SDK

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pull OpenAPI Generator Docker image
        run: docker pull openapitools/openapi-generator-cli:v7.16.0

      - name: Generate SDK from committed spec
        run: make generate

      - name: Format generated code
        run: make format

      - name: Lint generated code
        run: make lint

      - name: Run import smoke test
        run: make smoke-test

      - name: Run unit tests
        run: make test
